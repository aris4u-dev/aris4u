name: CI

# Suite unitaria de ARIS4U en Linux, SIN Ollama ni recursos externos.
# Los tests que requieren Ollama/modelos locales están marcados `integration`
# y se deseleccionan aquí (ver pyproject.toml [tool.pytest.ini_options]).

on:
  push:
    branches: ["**"]
  pull_request:
    branches: ["**"]

# Cancela corridas viejas de la misma rama al empujar nuevo commit.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    name: pytest (not integration)
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout
        # C5 2026-07-06: SHA-pinned (supply-chain). Tag v4 = 34e114876b0b11c390a56381ad16ebd13914f8d5
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Install jq (hooks redact_secrets/gpu-crash-guard lo usan)
        run: sudo apt-get update -qq && sudo apt-get install -y -qq jq

      - name: Set up Python 3.12
        # C5 2026-07-06: SHA-pinned (supply-chain). Tag v5 = a26af69be951a213d495a4c3e4e4022e16d87065
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install (editable + dev extras)
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Security audit (pip-audit)
        # C4 2026-07-06: detecta CVEs en deps declaradas. pip-audit no es dep del proyecto;
        # se instala efímeramente en el runner. Falla si hay vulnerabilidades conocidas.
        run: |
          pip install pip-audit
          pip-audit

      - name: Run unit suite (Ollama-free)
        run: |
          # El venv del runner está en PATH → ruff/radon/python3 resuelven solos
          # (los hooks .sh y el quality gate caen a `python3`/PATH si .venv312 no existe).
          #
          # Dos marcadores excluidos:
          #   integration — tests que requieren Ollama o modelos locales cargados.
          #   livehost    — tests que leen config del host vivo (p.ej. ~/.claude.json);
          #                 en el runner CI esos archivos no existen → serían falsos rojos.
          python -m pytest -m "not integration and not livehost" -q --timeout=300

      - name: Smoke test (contract gate — Ollama degrades limpio)
        # Los 7 checks: MCP tools callable · backend sqlite · hooks bash-n ·
        # token-counting (fallback sin key) · guards bloquean · recall aísla · Ollama degrada.
        # Check 1 (import mcp_server) llama session_manager.init_db() como side-effect,
        # inicializando las tablas antes de que check 2 las consulte. Sin ANTHROPIC_API_KEY
        # check 4 cae a estimación por caracteres (n>0 igualmente válido). Ollama ausente
        # → check 7 retorna ok=False sin excepción (contrato de degradación limpia).
        run: python tools/adapt/smoke_test.py
